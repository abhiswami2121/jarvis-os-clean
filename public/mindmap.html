<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jarvis Cortex — Operational Mind Map</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    --glass-bg: rgba(10, 15, 30, 0.65);
    --glass-border: rgba(255, 255, 255, 0.08);
    --glass-highlight: rgba(255, 255, 255, 0.04);
    --text-primary: #e8edf5;
    --text-secondary: #8899b9;
    --accent-1: #6366f1;
    --accent-2: #06b6d4;
    --accent-3: #10b981;
    --accent-4: #f59e0b;
    --accent-5: #ef4444;
    --accent-6: #8b5cf6;
    --accent-7: #ec4899;
    --glow-1: rgba(99, 102, 241, 0.4);
    --glow-2: rgba(6, 182, 212, 0.4);
    --glow-3: rgba(16, 185, 129, 0.4);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: #080c18;
    color: var(--text-primary);
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    cursor: default;
    user-select: none;
    -webkit-user-select: none;
  }

  /* Cosmic Background */
  #bg-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  /* Main container */
  #app {
    position: relative;
    z-index: 1;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  .header {
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    background: var(--glass-bg);
    border-bottom: 1px solid var(--glass-border);
    z-index: 10;
  }
  .header-title {
    display: flex; align-items: center; gap: 12px;
  }
  .header-title h1 {
    font-size: 20px; font-weight: 700;
    background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header-stats {
    display: flex; gap: 20px; font-size: 12px; font-family: 'JetBrains Mono', monospace;
    color: var(--text-secondary);
  }
  .header-stats span {
    padding: 4px 12px; border-radius: 20px;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06);
  }
  .header-stats b { color: var(--text-primary); }

  /* Main layout */
  .main {
    flex: 1; display: flex; position: relative; overflow: hidden;
  }

  /* Mind Map Container */
  #mindmap {
    flex: 1; position: relative; cursor: grab;
  }
  #mindmap:active { cursor: grabbing; }
  #mindmap svg { width: 100%; height: 100%; }

  /* Eye Frame — slide-out detail panel */
  .eye-frame {
    position: absolute;
    right: 0; top: 0; bottom: 0;
    width: 420px;
    background: rgba(12, 18, 36, 0.9);
    backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px);
    border-left: 1px solid var(--glass-border);
    z-index: 20;
    transform: translateX(100%);
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    display: flex; flex-direction: column;
    box-shadow: -10px 0 40px rgba(0,0,0,0.5);
  }
  .eye-frame.open { transform: translateX(0); }

  .eye-frame-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--glass-border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .eye-frame-header h2 {
    font-size: 16px; font-weight: 600;
    display: flex; align-items: center; gap: 8px;
  }
  .eye-frame-close {
    width: 32px; height: 32px; border-radius: 50%;
    border: 1px solid var(--glass-border);
    background: rgba(255,255,255,0.05);
    color: var(--text-secondary);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    transition: all 0.2s;
  }
  .eye-frame-close:hover {
    background: rgba(255,255,255,0.1); color: var(--text-primary);
  }

  .eye-frame-body {
    flex: 1; overflow-y: auto; padding: 20px 24px;
  }

  .eye-frame-body::-webkit-scrollbar { width: 4px; }
  .eye-frame-body::-webkit-scrollbar-track { background: transparent; }
  .eye-frame-body::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.1); border-radius: 2px;
  }

  /* Detail sections */
  .detail-section {
    margin-bottom: 24px;
  }
  .detail-section h3 {
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 1.5px; color: var(--text-secondary);
    margin-bottom: 10px;
  }
  .detail-chip {
    display: inline-block; padding: 4px 10px; margin: 2px 4px 2px 0;
    border-radius: 12px; font-size: 11px; font-weight: 500;
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
    transition: all 0.2s;
  }
  .detail-chip:hover {
    background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.15);
  }
  .detail-stat {
    display: flex; justify-content: space-between; padding: 6px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    font-size: 13px;
  }
  .detail-stat .label { color: var(--text-secondary); }
  .detail-stat .value { font-weight: 600; }

  /* Legend / Controls */
  .controls {
    position: absolute; bottom: 24px; left: 24px;
    display: flex; gap: 8px; z-index: 15;
  }
  .control-btn {
    padding: 8px 16px; border-radius: 20px;
    border: 1px solid var(--glass-border);
    background: var(--glass-bg);
    backdrop-filter: blur(10px);
    color: var(--text-secondary);
    font-size: 12px; font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  .control-btn:hover, .control-btn.active {
    background: rgba(255,255,255,0.1);
    color: var(--text-primary);
    border-color: rgba(255,255,255,0.2);
  }

  /* Tooltip */
  .tooltip {
    position: absolute; pointer-events: none;
    padding: 8px 14px;
    background: rgba(15, 20, 40, 0.95);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    font-size: 12px; font-weight: 500;
    backdrop-filter: blur(20px);
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 25;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    white-space: nowrap;
  }
  .tooltip.visible { opacity: 1; }

  /* Particle accent */
  .node-glow {
    filter: drop-shadow(0 0 8px var(--glow-1));
  }

  /* Ring labels */
  .ring-label {
    font-size: 10px; font-weight: 500;
    fill: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 2px;
    opacity: 0.6;
    transition: opacity 0.3s;
  }
  .ring-label:hover { opacity: 1; }

  /* Connection lines */
  .connection {
    stroke: rgba(255,255,255,0.06);
    stroke-width: 1;
    transition: all 0.3s;
  }
  .connection.highlight {
    stroke: rgba(99, 102, 241, 0.4);
    stroke-width: 2;
  }

  /* Pulse animation for central node */
  @keyframes pulse {
    0%, 100% { r: 36; opacity: 0.3; }
    50% { r: 44; opacity: 0.1; }
  }
  .pulse-ring {
    animation: pulse 3s ease-in-out infinite;
  }

  /* Mobile */
  @media (max-width: 768px) {
    .eye-frame { width: 100%; }
    .header-stats { display: none; }
  }
</style>
</head>

// ─── BACKGROUND PARTICLES ───
const bgCanvas = document.getElementById('bg-canvas');
const bgCtx = bgCanvas.getContext('2d');

function resizeBg() {
  bgCanvas.width = window.innerWidth;
  bgCanvas.height = window.innerHeight;
}
resizeBg();
window.addEventListener('resize', resizeBg);

// Initialize particles
for (let i = 0; i < 80; i++) {
  particles.push({
    x: Math.random() * bgCanvas.width,
    y: Math.random() * bgCanvas.height,
    r: Math.random() * 2 + 0.5,
    vx: (Math.random() - 0.5) * 0.3,
    vy: (Math.random() - 0.5) * 0.3,
    opacity: Math.random() * 0.5 + 0.1
  });
}

function animateBg() {
  bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    if (p.x < 0) p.x = bgCanvas.width;
    if (p.x > bgCanvas.width) p.x = 0;
    if (p.y < 0) p.y = bgCanvas.height;
    if (p.y > bgCanvas.height) p.y = 0;
    bgCtx.beginPath();
    bgCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    bgCtx.fillStyle = `rgba(99, 102, 241, ${p.opacity})`;
    bgCtx.fill();
  });

  // Connect nearby particles
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 120) {
        bgCtx.beginPath();
        bgCtx.moveTo(particles[i].x, particles[i].y);
        bgCtx.lineTo(particles[j].x, particles[j].y);
        bgCtx.strokeStyle = `rgba(99, 102, 241, ${0.04 * (1 - dist / 120)})`;
        bgCtx.stroke();
      }
    }
  }
  requestAnimationFrame(animateBg);
}
animateBg();

  const h = mindmap.clientHeight;
  const cx = w / 2;
  const cy = h / 2;

  if (currentView === 'radial') {

  } else {
    return getRingsLayout(cx, cy, w, h);
  }

function getRadialLayout(cx, cy, w, h) {
  const nodes = [];
  const rings = ARCHITECTURE.rings;
  const ringCount = rings.length;
  const baseRadius = Math.min(w, h) * 0.12;
  const ringSpacing = Math.min(w, h) * 0.11;

  // Core
  nodes.push({
    id: 'core', label: 'JARVIS', icon: '🧠', x: cx, y: cy,
    r: 32, color: '#8b5cf6', ring: 'core', type: 'core',
    data: ARCHITECTURE.core
  });
  nodeMap['core'] = nodes[0];

  // Ring nodes
  rings.forEach((ring, ri) => {
    const ringR = baseRadius + ringSpacing * (ri + 0.7);
    const nodeCount = ring.nodes.length;
    const startAngle = ri * (Math.PI / 8);

    ring.nodes.forEach((node, ni) => {
      const angle = startAngle + (ni / nodeCount) * Math.PI * 2;
      // Add slight variation
      const variation = (Math.random() - 0.5) * 0.15;
      const r = ringR * (1 + variation * 0.3);
      const x = cx + Math.cos(angle + variation) * r;
      const y = cy + Math.sin(angle + variation) * r * 0.85; // Slightly elliptical

      const layoutNode = {
        id: node.id, label: node.label, sub: node.sub || '',
        icon: ring.icon, x, y, r: 18,
        color: ring.color, ring: ring.id, type: 'node',
        data: node
      };
      nodes.push(layoutNode);
      nodeMap[node.id] = layoutNode;
    });

    // Ring label
    const labelAngle = ri * (Math.PI / 8);
    const labelR = ringR + 8;
    nodes.push({
      id: `ring-${ring.id}`, label: ring.label, icon: ring.icon,
      x: cx + Math.cos(labelAngle) * labelR,
      y: cy + Math.sin(labelAngle) * labelR * 0.85,
      r: 0, color: ring.color, ring: ring.id, type: 'ring-label'
    });
  });

  return nodes;
}

function getRingsLayout(cx, cy, w, h) {
  const nodes = [];
  // Core center
  nodes.push({
    id: 'core', label: 'JARVIS', icon: '🧠', x: cx, y: cy,
    r: 30, color: '#8b5cf6', ring: 'core', type: 'core',
    data: ARCHITECTURE.core
  });
  nodeMap['core'] = nodes[0];

  const rings = ARCHITECTURE.rings;
  const startY = 60;
  const bandHeight = (h - startY - 40) / rings.length;

  rings.forEach((ring, ri) => {
    const ringY = startY + bandHeight * ri + bandHeight / 2;
    const nodeCount = ring.nodes.length;
    const spacing = w / (nodeCount + 1);

    ring.nodes.forEach((node, ni) => {
      const x = spacing * (ni + 1);
      const y = ringY;
      const layoutNode = {
        id: node.id, label: node.label, sub: node.sub || '',
        icon: ring.icon, x, y, r: 16,
        color: ring.color, ring: ring.id, type: 'node',
        data: node
      };
      nodes.push(layoutNode);
      nodeMap[node.id] = layoutNode;
    });

    // Ring label on the left
    nodes.push({
      id: `ring-${ring.id}`, label: ring.label, icon: ring.icon,
      x: 60, y: ringY, r: 0,
      color: ring.color, ring: ring.id, type: 'ring-label'
    });
  });

  return nodes;
}

function render() {
  allNodes = getLayout();

  // Build SVG
  let html = '<defs>';
  // Glow filters
  ['#6366f1','#06b6d4','#10b981','#f59e0b','#ef4444','#ec4899','#8b5cf6'].forEach((c,i) => {
    html += `<filter id="glow-${i}"><feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>`;
  });
  html += '<radialGradient id="core-grad"><stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.8"/><stop offset="100%" stop-color="#6366f1" stop-opacity="0.3"/></radialGradient>';
  html += '</defs>';

  // Background grid
  html += `<pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.02)"/>
  </pattern>`;
  html += `<rect width="100%" height="100%" fill="url(#grid)"/>`;

  // Connections
  const connSet = new Set();
  ARCHITECTURE.connections.forEach(conn => {
    const fromNode = nodeMap[conn.from];
    const toNode = nodeMap[conn.to];
    if (!fromNode || !toNode) return;
    const key = [conn.from, conn.to].sort().join('-');
    if (connSet.has(key)) return;
    connSet.add(key);

    const isHighlighted = activeNode && (conn.from === activeNode.id || conn.to === activeNode.id);
    html += `<line x1="${fromNode.x}" y1="${fromNode.y}" x2="${toNode.x}" y2="${toNode.y}"
      class="connection ${isHighlighted ? 'highlight' : ''}"
      data-from="${conn.from}" data-to="${conn.to}"/>`;
  });

  // Nodes
  allNodes.forEach(node => {
    if (node.type === 'ring-label') {
      html += `<text x="${node.x}" y="${node.y}" class="ring-label" text-anchor="start" dominant-baseline="middle"
        style="fill:${node.color};font-size:10px;font-weight:600;letter-spacing:1.5px;opacity:0.7;">
        ${node.icon} ${node.label}</text>`;
    } else if (node.type === 'core') {
      // Pulse rings
      html += `<circle cx="${node.x}" cy="${node.y}" r="42" fill="none" stroke="rgba(139,92,246,0.2)" stroke-width="2" class="pulse-ring"/>`;
      html += `<circle cx="${node.x}" cy="${node.y}" r="48" fill="none" stroke="rgba(139,92,246,0.12)" stroke-width="1.5" class="pulse-ring" style="animation-delay:1.5s"/>`;
      // Core node
      html += `<circle cx="${node.x}" cy="${node.y}" r="${node.r}" fill="url(#core-grad)" stroke="rgba(139,92,246,0.6)" stroke-width="2"
        class="node node-core" data-id="${node.id}" style="cursor:pointer"/>`;
      html += `<text x="${node.x}" y="${node.y - 4}" text-anchor="middle" dominant-baseline="middle"
        style="fill:white;font-size:18px;pointer-events:none">${node.icon}</text>`;
      html += `<text x="${node.x}" y="${node.y + 14}" text-anchor="middle" dominant-baseline="middle"
        style="fill:rgba(255,255,255,0.8);font-size:8px;font-weight:700;letter-spacing:1px;pointer-events:none">${node.label}</text>`;
    } else {
      // Regular node
      const h = activeNode && node.id === activeNode.id;
      html += `<circle cx="${node.x}" cy="${node.y}" r="${node.r}"
        fill="${h ? node.color : 'rgba(20,30,55,0.8)'}"
        stroke="${node.color}"
        stroke-width="${h ? 2.5 : 1.5}"
        stroke-opacity="${h ? 0.9 : 0.4}"
        class="node" data-id="${node.id}"
        style="cursor:pointer;transition:all 0.3s"
        filter="${h ? 'url(#glow-0)' : ''}"/>`;
      html += `<text x="${node.x}" y="${node.y - 6}" text-anchor="middle" dominant-baseline="middle"
        style="fill:rgba(255,255,255,0.9);font-size:10px;pointer-events:none;font-weight:500">${node.label}</text>`;
      if (node.sub) {
        html += `<text x="${node.x}" y="${node.y + 8}" text-anchor="middle" dominant-baseline="middle"
          style="fill:rgba(255,255,255,0.4);font-size:7px;pointer-events:none">${node.sub}</text>`;
      }
    }
  });

  svg.innerHTML = html;

  // Attach events
  svg.querySelectorAll('.node').forEach(el => {
    el.addEventListener('click', (e) => {
      const id = el.dataset.id;
      if (id) openEye(id);
    });
    el.addEventListener('mouseenter', (e) => {
      const id = el.dataset.id;
      if (id && id !== 'core') showTooltip(e, id);
      hoveredNode = id;
      if (id) highlightConnections(id);
    });
    el.addEventListener('mouseleave', () => {
      hideTooltip();
      hoveredNode = null;
      clearHighlights();
    });
  });

  // Apply current transform
  applyTransform();
}

function highlightConnections(nodeId) {
  svg.querySelectorAll('.connection').forEach(line => {
    if (line.dataset.from === nodeId || line.dataset.to === nodeId) {
      line.classList.add('highlight');
    }
  });
}

function clearHighlights() {
  svg.querySelectorAll('.connection').forEach(line => {
    line.classList.remove('highlight');
  });
}

function applyTransform() {
  svg.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
  svg.style.transformOrigin = 'center center';
}

// ─── INTERACTIONS ───
mindmap.addEventListener('mousedown', (e) => {
  if (e.target.closest('.node')) return;
  isDragging = true;
  dragStartX = e.clientX - translateX;
  dragStartY = e.clientY - translateY;
  mindmap.style.cursor = 'grabbing';
});

window.addEventListener('mousemove', (e) => {
  if (isDragging) {
    translateX = e.clientX - dragStartX;
    translateY = e.clientY - dragStartY;
    applyTransform();
  }
});

window.addEventListener('mouseup', () => {
  isDragging = false;
  mindmap.style.cursor = 'grab';
});

mindmap.addEventListener('wheel', (e) => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  scale = Math.max(0.3, Math.min(3, scale * delta));
  applyTransform();
});

function resetZoom() {
  scale = 1;
  translateX = 0;
  translateY = 0;
  applyTransform();
}

function setView(view) {
  currentView = view;
  document.querySelectorAll('.control-btn').forEach((b, i) => {
    b.classList.toggle('active', (i === 0 && view === 'radial') || (i === 1 && view === 'rings'));
  });
  render();
}

// ─── TOOLTIP ───
function showTooltip(e, nodeId) {
  const node = nodeMap[nodeId];
  if (!node) return;
  tooltip.innerHTML = `<b>${node.label}</b><br><span style="color:${node.color};font-size:10px">${node.sub || ''}</span>`;
  tooltip.classList.add('visible');
  const rect = mindmap.getBoundingClientRect();
  tooltip.style.left = (e.clientX - rect.left + 12) + 'px';
  tooltip.style.top = (e.clientY - rect.top - 40) + 'px';
}

function hideTooltip() {
  tooltip.classList.remove('visible');
}

// ─── EYE FRAME ───
function openEye(nodeId) {
  const node = nodeMap[nodeId];
  if (!node) return;

  activeNode = node;
  const frame = document.getElementById('eye-frame');
  const title = document.getElementById('eye-title');
  const body = document.getElementById('eye-body');

  title.textContent = `${node.icon || ''} ${node.label}`;

  if (node.type === 'core') {
    const data = node.data;
    body.innerHTML = `
      <div class="detail-section">
        <h3>Description</h3>
        <p style="font-size:13px;color:var(--text-secondary);line-height:1.6">${data.desc}</p>
      </div>
      <div class="detail-section">
        <h3>Stats</h3>
        ${data.stats.map(s => `<div class="detail-stat"><span class="label">${s.label}</span><span class="value">${s.value}</span></div>`).join('')}
      </div>
      <div class="detail-section">
        <h3>Knowledge Systems</h3>
        ${['Cortex Graph (12,657 nodes)','Code Graph (20K+ nodes)','Brain Graph (1K nodes)','360 Warehouse (50K+ records)'].map(s =>
          `<span class="detail-chip" style="border-color:rgba(99,102,241,0.3);color:#6366f1">📚 ${s}</span>`
        ).join('')}
      </div>
      <div class="detail-section">
        <h3>Connected To</h3>
        ${ARCHITECTURE.connections.filter(c => c.from === 'core').slice(0,8).map(c => {
          const n = nodeMap[c.to];
          return n ? `<span class="detail-chip">→ ${n.icon || ''} ${n.label}</span>` : '';
        }).join('')}
      </div>
    `;
  } else {
    const data = node.data;
    const ring = ARCHITECTURE.rings.find(r => r.id === node.ring);
    body.innerHTML = `
      <div class="detail-section">
        <h3>Ring</h3>
        <span class="detail-chip" style="border-color:${node.color}40;color:${node.color}">${ring?.icon || ''} ${ring?.label || node.ring}</span>
      </div>
      <div class="detail-section">
        <h3>Description</h3>
        <p style="font-size:13px;color:var(--text-secondary);line-height:1.6">${data.desc}</p>
      </div>
      ${data.sub ? `<div class="detail-section"><h3>Type</h3><span class="detail-chip">${data.sub}</span></div>` : ''}
      <div class="detail-section">
        <h3>Connections</h3>
        ${ARCHITECTURE.connections.filter(c => c.from === nodeId || c.to === nodeId).map(c => {
          const other = c.from === nodeId ? c.to : c.from;
          const n = nodeMap[other];
          return n ? `<span class="detail-chip">${n.icon || ''} ${n.label}</span>` : '';
        }).join('')}
      </div>
    `;
  }

  frame.classList.add('open');
  render(); // Re-render to show highlights
}

function closeEye() {
  document.getElementById('eye-frame').classList.remove('open');
  activeNode = null;
  render();
}

// ─── INIT ───
render();

// Handle resize
window.addEventListener('resize', () => {
  resizeBg();
  render();
});

console.log('🔮 Jarvis Cortex Mind Map ready');
console.log('   Click any node to inspect | Scroll to zoom | Drag to pan');
console.log('   Use bottom controls to switch views');
</script>
